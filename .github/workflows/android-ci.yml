name: Android CI

# Собирает APK и публикует его как artifact GitHub Actions:
#   • на каждый push в main и каждый PR — debug APK (для быстрой проверки сборки);
#   • дополнительно на push тега v* — release APK (подписанный, если заданы секреты).
# Скачать APK: вкладка Actions → нужный run → раздел Artifacts.
#
# google-services.json НЕ нужен: плагин com.google.gms.google-services в проекте
# не подключён (нативный Google Sign-In пока выключен, см. app/build.gradle.kts).
# Если он появится — добавить шаг, материализующий google-services.json из секрета
# GOOGLE_SERVICES_JSON перед сборкой.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Debug APK: всегда, быстрый сигнал что проект собирается ---------------
  debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nivel-trainer-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  # --- Release APK: только на теги v* ---------------------------------------
  # Подписывается настоящим keystore, ЕСЛИ заданы секреты репозитория
  # (SIGNING_KEY_BASE64, SIGNING_STORE_PASSWORD, SIGNING_KEY_ALIAS,
  #  SIGNING_KEY_PASSWORD). Без них собирается unsigned release APK —
  # установить его на телефон нельзя, нужно подписать (см. README / human steps).
  release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Декодируем keystore из секрета в файл, если он задан.
      # SIGNING_KEY_BASE64 = `base64 -w0 release.keystore` (см. README).
      - name: Decode keystore
        id: keystore
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Секрет SIGNING_KEY_BASE64 не задан — release APK будет UNSIGNED."
          fi

      - name: Build release APK
        env:
          SIGNING_STORE_FILE: ${{ steps.keystore.outputs.present == 'true' && format('{0}/release.keystore', runner.temp) || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: nivel-trainer-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90
